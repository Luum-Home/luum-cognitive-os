# Tracks what we adopted from upstream repos, which version, and our adaptation
# Run `scripts/check-upstream-changes.sh` to check for updates

upstream_repos:
  hermes-agent:
    url: https://github.com/NousResearch/hermes-agent
    license: MIT
    submodule_path: .claude/plugins/hermes-agent
    last_sync: "2026-04-09"

  pi-mono:
    url: https://github.com/badlogic/pi-mono
    license: MIT
    submodule_path: .claude/plugins/pi-mono
    last_sync: "2026-04-09"

adoptions: []
# Will be populated as we adopt features. Format:
