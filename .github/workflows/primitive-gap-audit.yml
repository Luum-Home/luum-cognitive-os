name: Primitive Gap Audit

on:
  schedule:
    - cron: '30 12 * * MON'  # every Monday 12:30 UTC, after public metrics
  workflow_dispatch: {}

jobs:
  primitive-gap-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Generate primitive gap snapshot
        run: |
          python3 scripts/primitive_gap_snapshot.py \
            --trend \
            --trend-path docs/reports/primitive-gap-history.jsonl \
            --markdown docs/reports/primitive-gap-latest.md \
            --regression-report docs/reports/primitive-gap-regressions.md \
            --fail-on-regression \
            --json > docs/reports/primitive-gap-latest.json

      - name: Run documentation duplicate audit
        run: |
          python3 scripts/docs_duplicate_audit.py \
            --baseline docs/reports/docs-duplicate-baseline.json \
            --markdown docs/reports/docs-duplicate-latest.md \
            --fail-new \
            --json > docs/reports/docs-duplicate-latest.json

      - name: Upload primitive gap snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: primitive-gap-snapshot
          path: |
            docs/reports/primitive-gap-latest.json
            docs/reports/primitive-gap-latest.md
            docs/reports/primitive-gap-regressions.md
            docs/reports/primitive-gap-history.jsonl
            docs/reports/docs-duplicate-baseline.json
            docs/reports/docs-duplicate-latest.json
            docs/reports/docs-duplicate-latest.md

      - name: Commit primitive gap trend
        run: |
          git config user.name "cognitive-os-bot"
          git config user.email "bot@luum.ai"
          git add docs/reports/primitive-gap-latest.json docs/reports/primitive-gap-latest.md docs/reports/primitive-gap-regressions.md docs/reports/primitive-gap-history.jsonl docs/reports/docs-duplicate-latest.json docs/reports/docs-duplicate-latest.md
          git diff --staged --quiet || git commit -m "chore(audit): weekly primitive gap snapshot $(date -u +%Y-%m-%d)"
          git push
