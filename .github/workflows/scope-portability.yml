name: Scope portability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: scope-portability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope-portability:
    name: Primitive scope portability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Syntax check scope tools
        run: |
          python -m py_compile \
            scripts/cos-scope-both-portability-audit \
            scripts/cos-scope-projection-audit
          bash -n scripts/cos-status.sh scripts/cos-ci-local.sh .githooks/pre-commit

      - name: Run targeted scope portability tests
        run: |
          python -m pytest \
            tests/unit/test_scope_both_portability_audit.py \
            tests/unit/test_scope_projection_audit.py \
            tests/behavior/test_scope_portability_precommit.py \
            tests/behavior/test_cos_status.py \
            -q

      - name: Run scope portability status
        run: scripts/cos status --portability --json
