# =============================================================================
# Cognitive OS — AI/ML Tooling (Universal)
# =============================================================================
# LLM observability, guardrails, proxy, and agent coordination.
# Portable: add to any project.
#
# Requires: docker network create cognitive-os-network (or configure external network)
#
# Usage:
#   docker-compose -f docker-compose.cognitive-os.yml up -d           # All services
#   docker-compose -f docker-compose.cognitive-os.yml up -d paperclip # Only what you need
#   docker-compose -f docker-compose.cognitive-os.yml down             # Shut down
#
# NOTE (ADR-058, 2026-04-24): the former observability trace-UI stack and
# its 5 dependency containers have been removed. LLM observability migrated
# to Arize Phoenix (pip: arize-phoenix). Run UI via:
#   uv run phoenix serve    (http://localhost:6006). See ADR-058.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # ADR-058 (2026-04-24): former observability trace-UI stack removed —
  # migrated to Arize Phoenix (pip). See ADR-058 for rationale and the
  # Phoenix activation runbook.
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # REMOVED 2026-04-21 per ADR-049:
  #   - litellm:  supply chain compromise (Trend Micro, Mar 2026) + proxy
  #               concentrates API keys. Replaced by lib/qwen_provider.py
  #               (direct SDK, no proxy). See ADR-049 rationale.
  #   - bifrost:  safer than LiteLLM but still a proxy; overengineering for
  #               single-operator sub-agent orchestration. Removed alongside
  #               LiteLLM to keep the security perimeter minimal.
  # If you find yourself needing a gateway again, re-evaluate Bifrost
  # (Apache 2.0, Go binary) — but strongly prefer direct SDKs first.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # NeMo Guardrails — AI security guardrails server (Apache 2.0)
  # https://github.com/NVIDIA/NeMo-Guardrails
  # Jailbreak detection + PII masking for AI-powered features
  # MIGRATED TO PIP: pip install nemoguardrails>=0.10. Container kept for reference/CI.
  # Use in-process: from nemoguardrails import RailsConfig, LLMRails
  # ---------------------------------------------------------------------------
  nemo-guardrails:
    build:
      context: ./infra/nemo-guardrails
      dockerfile: Dockerfile
    container_name: cognitive-os-nemo-guardrails
    restart: unless-stopped
    ports:
      - "${NEMO_GUARDRAILS_PORT:-8088}:8088"
    environment:
      # Uncomment when using LLM-based rails:
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      LOG_LEVEL: ${NEMO_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/v1/rails/configs')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Paperclip PostgreSQL — Database for Paperclip agent coordination
  # ---------------------------------------------------------------------------
  paperclip-pg:
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1  # pinned 2026-03-28
    container_name: cognitive-os-paperclip-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAPERCLIP_PG_USER:-paperclip}
      POSTGRES_PASSWORD: ${PAPERCLIP_PG_PASS:-paperclip}
      POSTGRES_DB: ${PAPERCLIP_PG_DB:-paperclip}
    ports:
      - "127.0.0.1:${PAPERCLIP_PG_PORT:-5438}:5432"
    volumes:
      - paperclip-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Paperclip — Agent Coordination Platform
  # Built from local source at ./paperclip/
  # UI: http://localhost:3200
  # ---------------------------------------------------------------------------
  paperclip:
    container_name: cognitive-os-paperclip
    image: reeoss/paperclipai-paperclip:latest  # mirror with ARM64 support (ghcr.io needs auth)
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3200}:3100"
    environment:
      DATABASE_URL: postgres://${PAPERCLIP_PG_USER:-paperclip}:${PAPERCLIP_PG_PASS:-paperclip}@paperclip-pg:5432/${PAPERCLIP_PG_DB:-paperclip}
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3200}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-cognitive-os-paperclip-local-dev-secret}
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_ADMIN_EMAIL: ${PAPERCLIP_ADMIN_EMAIL:-admin@cognitive-os.local}
      PAPERCLIP_ADMIN_PASSWORD: ${PAPERCLIP_ADMIN_PASSWORD:-changeme-not-for-production}
      PAPERCLIP_ADMIN_NAME: ${PAPERCLIP_ADMIN_NAME:-Cognitive OS Admin}
    volumes:
      - paperclip-data:/paperclip
      - ./infra/paperclip/init-config.sh:/app/init-config.sh:ro
    entrypoint: ["/bin/sh", "/app/init-config.sh"]
    depends_on:
      paperclip-pg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # memU — Proactive Memory for AI Agents (Apache 2.0)
  # https://github.com/NevaMind-AI/memU
  # 3-layer hierarchical memory: Resource → Item → Category
  # MIGRATED TO PIP: pip install memu>=2.0. Container kept for reference/CI.
  # Container was just a pip install wrapper anyway. Run: python -m memu.server
  # ---------------------------------------------------------------------------
  #
  # ADR-058 (2026-04-24): Postgres backend previously provided by the
  # retired observability-pg container has been removed. If you need memu
  # with a Docker Postgres, bring your own (e.g., add a dedicated memu-pg
  # service) or use the pip path
  # (`pip install memu-ai && python -m memu.server`) which is the supported
  # mode per cognitive-os.yaml (`services.memu.mode: pip`).
  memu:
    image: python:3.13-slim@sha256:739e7213785e88c0f702dcdc12c0973afcbd606dbf021a589cab77d6b00b579d  # pinned 2026-03-28
    container_name: cognitive-os-memu
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "pip install memu-ai 2>/dev/null &&
      python -m memu.server --host 0.0.0.0 --port 8765"
    ports:
      - "127.0.0.1:${COGNITIVE_OS_MEMU_PORT:-8765}:8765"
    environment:
      # MEMU_DB_URL must be supplied by the user (see ADR-058 note above).
      MEMU_DB_URL: ${MEMU_DB_URL:-}
      MEMU_LLM_PROVIDER: ${MEMU_LLM_PROVIDER:-openai}
      MEMU_LLM_API_KEY: ${MEMU_LLM_API_KEY:-}
      MEMU_LOG_LEVEL: ${MEMU_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognitive-os-network
    profiles:
      - memory  # Only starts with: docker compose --profile memory up

  # ---------------------------------------------------------------------------
  # AutoMaker — Kanban-based AI Development Studio (MIT)
  # https://github.com/AutoMaker-Org/automaker
  # Visual Kanban UI + Claude Agent SDK + real-time agent streaming
  # COS hooks fire automatically when AutoMaker launches Claude sessions
  # ---------------------------------------------------------------------------
  automaker:
    image: ghcr.io/automaker-org/automaker:latest  # TODO: pin digest — registry denied access, verify and pin before production
    container_name: cognitive-os-automaker
    restart: unless-stopped
    ports:
      - "${COGNITIVE_OS_AUTOMAKER_PORT:-4200}:4200"
    volumes:
      - .:/workspace
    environment:
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      WORKSPACE_DIR: /workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognitive-os-network
    profiles:
      - ui  # Only starts with: docker compose --profile ui up

  # ---------------------------------------------------------------------------
  # Jupyter — GPU/Compute Sandbox for ML, data processing, analytics
  # UI: http://localhost:8888 (token: cognitive-os-dev)
  # MIGRATED TO PIP: pip install jupyter>=1.0 notebook>=7.0. Container kept for reference/CI.
  # Run locally: jupyter lab (or jupyter notebook)
  # ---------------------------------------------------------------------------
  jupyter:
    image: jupyter/scipy-notebook@sha256:fca4bcc9cbd49d9a15e0e4df6c666adf17776c950da9fa94a4f0a045d5c4ad33  # pinned 2026-03-28 — was untagged (implicit :latest)
    container_name: cognitive-os-jupyter
    restart: unless-stopped
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-cognitive-os-dev}"
    volumes:
      - jupyter-data:/home/jovyan/work
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Opik — LLM Observability, Tracing & Evaluation (ADOPT)
  # MIGRATED TO PIP: pip install opik>=1.0. Container kept for reference/CI.
  # Already configured to use Comet cloud API (comet.com/opik). No local server needed.
  #
  # ADR-058 (2026-04-24): ClickHouse and Valkey backends previously provided
  # by the retired observability-stack containers have been removed. Users
  # who want to run the self-hosted opik stack must supply their own
  # ClickHouse + Redis (hostnames/credentials via OPIK_CLICKHOUSE_HOST /
  # OPIK_REDIS_URL). The supported path is pip + Comet cloud
  # (cognitive-os.yaml `services.opik.mode: cloud`).
  # ---------------------------------------------------------------------------
  opik-backend:
    image: ghcr.io/comet-ml/opik/opik-backend:latest@sha256:60d310f4180f05b09c1cd4b1bcf2f94025c8b5ae4644e969efc12551397ed70a  # pinned 2026-03-28 — was :latest (mutable)
    container_name: cognitive-os-opik-backend
    restart: unless-stopped
    environment:
      # ClickHouse host must be user-supplied (see ADR-058 note above).
      ANALYTICS_DB_MIGRATIONS_URL: jdbc:clickhouse://${OPIK_CLICKHOUSE_HOST:-clickhouse}:${OPIK_CLICKHOUSE_HTTP_PORT:-8123}/opik
      ANALYTICS_DB_MIGRATIONS_USER: ${OPIK_CH_USER:-clickhouse}
      ANALYTICS_DB_MIGRATIONS_PASS: ${OPIK_CH_PASS:-clickhouse}
      ANALYTICS_DB_PROTOCOL: HTTP
      ANALYTICS_DB_HOST: ${OPIK_CLICKHOUSE_HOST:-clickhouse}
      ANALYTICS_DB_PORT: "${OPIK_CLICKHOUSE_HTTP_PORT:-8123}"
      ANALYTICS_DB_USERNAME: ${OPIK_CH_USER:-clickhouse}
      ANALYTICS_DB_PASS: ${OPIK_CH_PASS:-clickhouse}
      ANALYTICS_DB_DATABASE_NAME: opik
      # Redis/Valkey URL must be user-supplied.
      REDIS_URL: ${OPIK_REDIS_URL:-redis://localhost:6379/0}
      STATE_DB_PROTOCOL: jdbc:mysql://
      STATE_DB_URL: opik-mysql:3306/opik?createDatabaseIfNotExist=true
      STATE_DB_USER: ${OPIK_MYSQL_USER:-opik}
      STATE_DB_PASS: ${OPIK_MYSQL_PASS:-opik_pass}
      STATE_DB_DATABASE_NAME: opik
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "${OPIK_PORT:-5173}:8080"
    depends_on:
      opik-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/is-alive/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - observability
    networks:
      - cognitive-os-network

  opik-mysql:
    image: mysql:8.4@sha256:da906917ca4ace3ba55538b7c2ee97a9bc865ef14a4b6920b021f0249d603f3d  # pinned 2026-03-28
    container_name: cognitive-os-opik-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OPIK_MYSQL_ROOT_PASS:-opik_root_pass}
      MYSQL_DATABASE: opik
      MYSQL_USER: ${OPIK_MYSQL_USER:-opik}
      MYSQL_PASSWORD: ${OPIK_MYSQL_PASS:-opik_pass}
    volumes:
      - opik-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - observability
    networks:
      - cognitive-os-network

  opik-frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:latest@sha256:007cb7d328caa4d5d08411585a9fc8fa1120580b4fba6a9dc124e967bcc79b64  # pinned 2026-03-28 — was :latest (mutable)
    container_name: cognitive-os-opik-frontend
    restart: unless-stopped
    environment:
      OPIK_API_URL: http://opik-backend:8080/api
    ports:
      - "${OPIK_UI_PORT:-5174}:5173"
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - observability
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Webhook Trigger — GitHub webhook server for automated SDD pipelines
  # Receives issue/PR events and launches Claude-based pipelines
  # ---------------------------------------------------------------------------
  webhook-trigger:
    build:
      context: ./skills/webhook-trigger
      dockerfile: Dockerfile
    container_name: cognitive-os-webhook-trigger
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-8001}:8001"
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WEBHOOK_PORT: "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - automation
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Valkey — General-purpose Redis-compatible cache/pubsub (BSD-3)
  # Used by: Agent Communication Bus (lib/agent_bus.py), rate limiter queue
  # (ADR-058: the auth-guarded observability-valkey container was removed.)
  #
  # ADR-042 (2026-04-20): MIGRATED TO LOCAL DAEMON.
  # cos-valkey-local.sh starts redis-server/valkey-server on localhost:6379 (or 6380).
  # This container is kept for legacy compatibility and CI environments where a
  # local binary is unavailable. It is NOT started by default.
  #
  # To use Docker Valkey explicitly:
  #   docker compose -f docker-compose.cognitive-os.yml --profile legacy up -d valkey
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8-alpine@sha256:cb3339abbd6e18942cd8ac3349f0c371a82ba5b6204b242563ba299e7956cbd0  # pinned 2026-03-28
    container_name: cognitive-os-valkey
    profiles:
      - legacy
    restart: unless-stopped
    command: >
      --maxmemory-policy noeviction
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # Cognee — Knowledge Graph Memory (ADOPT)
  # MIGRATED TO PIP: pip install cognee>=0.1. Container kept for reference/CI.
  # Use in-process: import cognee; cognee Python API directly.
  # ---------------------------------------------------------------------------
  cognee:
    image: python:3.13-slim@sha256:739e7213785e88c0f702dcdc12c0973afcbd606dbf021a589cab77d6b00b579d  # pinned 2026-03-28
    container_name: cognitive-os-cognee
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["/app/docker-entrypoint.sh"]
    environment:
      COGNEE_GRAPH_BACKEND: ${COGNEE_GRAPH_BACKEND:-networkx}
      COGNEE_VECTOR_STORE: ${COGNEE_VECTOR_STORE:-lancedb}
      COGNEE_LLM_PROVIDER: ${COGNEE_LLM_PROVIDER:-anthropic}
      COGNEE_LLM_MODEL: ${COGNEE_LLM_MODEL:-claude-sonnet-4-5-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${COGNEE_PORT:-8100}:8000"
    volumes:
      - ./infra/cognee/docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
      - cognee-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    profiles:
      - memory
    networks:
      - cognitive-os-network

  # ---------------------------------------------------------------------------
  # COS Dashboard — Cognitive OS Web Management UI
  # UI: http://localhost:3300
  # ---------------------------------------------------------------------------
  cos-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cognitive-os-dashboard
    restart: unless-stopped
    ports:
      - "${COGNITIVE_OS_DASHBOARD_PORT:-3300}:3300"
    volumes:
      - .:/cos:ro
    environment:
      COS_ROOT: /cos
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - ui
    networks:
      - cognitive-os-network

volumes:
  # bifrost-data removed 2026-04-21 per ADR-049 (gateway removal).
  # Volume is retained on disk until user runs: docker volume rm cognitive-os-bifrost-data
  jupyter-data:
    name: cognitive-os-jupyter-data
  # Former observability-stack data volumes removed 2026-04-24 per ADR-058.
  # User must run `docker volume rm` for each removed volume; see ADR-058 Phase 3.
  paperclip-pg-data:
    name: cognitive-os-paperclip-pg-data
  paperclip-data:
    name: cognitive-os-paperclip-data
  opik-mysql-data:
    name: cognitive-os-opik-mysql-data
  cognee-data:
    name: cognitive-os-cognee-data

networks:
  cognitive-os-network:
    name: cognitive-os-network
    external: true
