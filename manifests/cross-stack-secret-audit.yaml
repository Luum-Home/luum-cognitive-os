schema_version: cross-stack-secret-audit/v1
status: active
owner: platform-safety
purpose: >
  Multi-stack secret, credential, environment-file, and sensitive-data audit
  policy for release readiness and service-mode projection safety.

primary:
  toolchain: gitleaks-trufflehog
  tools:
    - gitleaks
    - trufflehog
  required_for:
    - pre-launch-release
    - public-repo-readiness
    - service-mode-readiness
  output_dir: .cognitive-os/reports/secret-audit
  live_verification_default: false

secondary:
  toolchain: detect-secrets
  mode: optional-python-heavy-cross-validation
  tools:
    - detect-secrets

forensic_escalation:
  toolchain: scancode-toolkit
  trigger:
    - primary-tools-disagree
    - suspected-real-secret-in-history
    - customer-security-review

workflow_policy:
  require_immutable_workflow_pin: true
  denied_mutable_actions:
    - gitleaks/gitleaks-action
    - zricethezav/gitleaks-action
    - trufflesecurity/trufflehog
    - trufflesecurity/trufflehog@main

policy:
  raw_secret_values_forbidden_in_reports: true
  trufflehog_only_verified_default_forbidden: true
  scanner_supply_chain_is_in_scope: true
  unknown_unclassified_findings: suspect
  block_on_classes:
    - valid
  strict_blocks_on_classes:
    - valid
    - suspect
  secret_never_touch:
    - '(^|/)\.env($|\.)'
    - '(^|/)\.env\.[^/]+$'
    - '(^|/).*\.pem$'
    - '(^|/).*\.key$'
    - '(^|/)id_rsa$'
    - '(^|/)id_ed25519$'
  exclude_paths:
    - '(^|/)\.git($|/)'
    - '(^|/)\.venv($|/)'
    - '(^|/)node_modules($|/)'
    - '(^|/)__pycache__($|/)'
    - '(^|/)\.pytest_cache($|/)'
    - '(^|/)\.mypy_cache($|/)'
    - '(^|/)\.cognitive-os/reports/secret-audit($|/)'
  placeholder_path_allowlist:
    - '(^|/)tests?($|/)'
    - '(^|/)testdata($|/)'
    - '(^|/)fixtures?($|/)'
    - '(^|/)docs/examples($|/)'
    - '(^|/)examples($|/)'
  placeholder_fingerprints:
    - '[REDACTED]'
    - 'FAKEKEYFORTEST'
    - 'T00000000/B00000000'
    - 'AKIAIOSFODNN7EXAMPLE'
    - 'ghp_FAKE'
    - 'sk-test-'
    - 'sk-ant-api03-deadbeef'

reporting:
  schema_version: cross-stack-secret-audit-report/v1
  latest_report: .cognitive-os/reports/secret-audit/cross-stack-secret-audit-latest.json
  metrics_stream: .cognitive-os/metrics/cross-stack-secret-audit.jsonl
