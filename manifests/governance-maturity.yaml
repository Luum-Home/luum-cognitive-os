# Advisory/blocking maturity labels for governance primitives whose value is easy
# to overstate in product docs. This manifest prevents diagnostic checks from
# being sold as hard gates without evidence.
schema_version: 1
primitives:
  - id: hooks/trust-score-validator.sh
    maturity: advisory
    enforcement: non_blocking
    exit_behavior: exit_0
    product_claim: Trust reports are parsed and surfaced as governance evidence; they do not block in reconstruction.
    promotion_requires:
      - blocking behavior test
      - phase-specific policy
      - false-positive budget
  - id: hooks/blast-radius.sh
    maturity: observe
    enforcement: additional_context
    exit_behavior: exit_0
    product_claim: Blast radius is scope telemetry/advice unless a separate blocking gate consumes it.
    promotion_requires:
      - explicit block threshold
      - repair command
      - false-positive budget
  - id: hooks/review-spawner.sh
    maturity: advisory
    enforcement: sampled_review
    exit_behavior: exit_0
    product_claim: Review spawning is stochastic quality sampling, not a deterministic completion gate.
    promotion_requires:
      - deterministic trigger contract
      - reviewer quality evaluation
      - bounded latency budget
