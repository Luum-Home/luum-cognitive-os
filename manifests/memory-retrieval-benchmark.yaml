schema_version: memory-retrieval-benchmark/v1
status: active
owner: memory-layer-evolution
adr: Wave-2-memory-layer-evolution
purpose: >-
  Deterministic Slice 0 benchmark for memory retrieval changes. This manifest
  must be green before Engram schema or retrieval defaults change.
fixture_dir: tests/fixtures/memory_retrieval
metrics:
  top_k: 5
  required:
    - precision_at_k
    - temporal_correctness
    - source_support
    - multi_hop_success
    - p95_latency_ms
fixtures:
  - id: temporal-contradiction-license-policy
    class: temporal_contradiction
    file: temporal_contradiction_license_policy.json
  - id: multi-hop-adr-implementation-test
    class: multi_hop
    file: multi_hop_adr_implementation_test.json
  - id: procedural-runbook-current
    class: procedural_query
    file: procedural_runbook_current.json
policy:
  non_mutating: true
  default_strategy: oracle_fixture
  blocks_schema_changes_until_green: true

strategies:
  current-local: current lexical/Jaccard baseline, no temporal or graph path support
  temporal-local: M1 validity/supersession-aware reranking, non-default
  graph-path-local: M1 + M3 explicit relation path support, non-default
  dual-level-local: M1 + M3 + M2 entity/topic scoring, non-default
  memory-class-local: M1 + M3 + M2 + M4 memory_class overlay, non-default
additive_schema_fields:
  - valid_from
  - valid_to
  - source_episode
  - memory_class
  - supersedes relation
