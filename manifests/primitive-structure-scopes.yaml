schema_version: primitive-structure-scopes/v1
purpose: >
  Structural SCOPE metadata for primitive files whose native format cannot safely
  carry an inline SCOPE comment without changing rendered project artifacts.
  This manifest is parser input only; semantic scope calibration remains governed
  by ADR-314.
