    answer_short: Yes. COS is designed to amplify without requiring prior knowledge of terminology, best practices, security, testing, or architecture. The developer describes the problem in natural language; COS maps it to the correct technical concept and executes.
    answer_long: >-
      A developer can say "I want this to not break under heavy load" without
      knowing what rate limiting, concurrency, or load testing means. COS
      interprets the intent, picks the correct primitives via the semantic
      skill router (ADR-296), and executes with specialized sub-agents. The
      same applies to security (/security-audit, /semgrep-scan), tests
      (/test-driven-development, /coverage-enforcement), documentation
      (/document-feature), and architecture (/code-review, /sdd-new). No
      knowledge of the technical term is required to get the right tool.
    recommended_pitch: You don't need to know the technical name for the problem. Describe what you want to avoid or achieve, and COS translates it.
    unsafe_claims_to_avoid:
    - COS automatically teaches the developer over time
    - no human intervention is ever needed
    gaps: []

