schema_version: product-question-bank/v1
adr: ADR-280
status: active
default_question_id: differentiator
questions:
  differentiator:
    category: positioning
    aliases:
    - diferenciador
    - factor diferenciador
    - cual es nuestro diferenciador
    - cuál es nuestro diferenciador
    - what is our differentiator
    - product wedge
    - moat
    keywords:
    - diferenciador
    - differentiator
    - wedge
    - moat
    - posicionamiento
    - positioning
    approved_sources:
    - docs/08-References/business/product-messaging.md
    - docs/08-References/business/cos-vs-vanilla-dx-review.md
    - docs/08-References/business/value-proposition.md
    - docs/04-Concepts/architecture/agentic-kernel-philosophy.md
    related_claims:
    - differentiator_behavioral_governance
    - claim_verification_wedge
    - cross_harness_behavioral_intelligence
    - cost_to_outcome
    - replay_restore_receipts
    - governed_self_improvement
    - generic_tracing_is_not_unique
    answer_short: Cognitive OS is the behavioral governance and evidence layer for
      agentic development; it makes coding agents prove work, coordinate safely, expose
      cost/risk, and leave replayable receipts across supported tools.
    answer_long: Cognitive OS should not be positioned as another IDE, generic multi-agent
      framework, tracing dashboard, or model wrapper. The defensible wedge is making
      fast but opaque coding agents verifiable, governable, coordinated, and portable.
      It checks whether agents actually verified completion claims, controls multi-agent
      and blast-radius risk, connects cost to verified outcomes, and preserves evidence
      that can be replayed or restored where the substrate is enabled.
    recommended_pitch: AI agents ship faster. Cognitive OS makes them prove it.
    unsafe_claims_to_avoid:
    - universal cross-IDE parity
    - autonomous self-improvement
    - generic agent-step tracing as unique
    - framework-agnostic support as the sole differentiator
    - 13-layer OS as first-contact messaging
    gaps:
    - Competitive claims against Datadog, Dynatrace, Langfuse, AgentOps, or Galileo
      require fresh external fact-checking before publication.
    - Some cross-harness and replay/restore claims remain maturity-scoped rather than
      universal.
  non_differentiators:
    category: positioning-boundary
    aliases:
    - que no es diferenciador
    - qué no es diferenciador
    - what is not unique
    - commodity claims
    keywords:
    - commodity
    - unico
    - único
    - not unique
    - no es diferenciador
    - tracing
    approved_sources:
