    - docs/02-Decisions/adrs/ADR-206-aspirational-claim-decommission-gate.md
    - docs/04-Concepts/architecture/primitive-fitness-evaluation-contract.md
    related_claims:
    - product_answer_primitive
    - governed_self_improvement
    answer_short: Yes. Automate product answers as read-only question-to-evidence
      reports, then let maintainers update manifests and evidence through governed
      review.
    answer_long: The safe automation path is not autonomous marketing copy. It is
      deterministic retrieval from a question bank, evidence manifest, product docs,
      claim gate, and generated trust report. Maintainer loops can propose changes
      when evidence drifts, but publication and risky competitive claims remain human-reviewed.
    recommended_pitch: If COS sells trust, its own messaging must be generated from
      trust-backed evidence.
    unsafe_claims_to_avoid:
    - marketing copy updates itself without review
    - stale competitive claims are safe because they came from a manifest
    gaps:
    - Add scheduled drift checks once the first question bank stabilizes.
