    answer_long: >-
      For an existing project: invoke /cognitive-os-init to generate the initial
      configuration (hooks, settings, structure). For questions about what each
      skill does: /skills-search or consult AGENTS.md. For guided feature
      development: /sdd-new starts the spec-driven pipeline. COS is progressive
      — you can start with one skill and expand. The onboarding flow varies by
      project and harness; there is no single canonical path yet.
    recommended_pitch: Start with /cognitive-os-init. COS adapts to the project, not the other way around.
    unsafe_claims_to_avoid:
    - onboarding is fully automatic and frictionless
    - works identically on all projects without configuration
    gaps:
