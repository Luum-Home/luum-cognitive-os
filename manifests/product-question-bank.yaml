    - docs/04-Concepts/architecture/agentic-kernel-philosophy.md
    - docs/08-References/business/value-proposition.md
    related_claims:
    - differentiator_behavioral_governance
    answer_short: Cognitive OS is a cognitive operating system that orchestrates AI agents over any software project. It amplifies developer capability across code quality, security, tests, documentation, and architecture — without requiring prior knowledge of those domains.
    answer_long: >-
      COS works as an intelligence layer on top of the project: the developer
      describes in natural language what they want to achieve, the OS picks the
      right tool (skill), and orchestrates specialized sub-agents to execute it.
      The developer describes the problem; COS maps it to the correct technical
      concept and acts. The result is verifiable, documented, and traceable.
    recommended_pitch: You describe what you want to achieve. COS figures out how to do it.
    unsafe_claims_to_avoid:
    - COS is fully autonomous and requires no human oversight
    - COS replaces the developer entirely
    gaps: []

