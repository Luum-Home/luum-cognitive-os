    - docs/08-References/business/product-messaging.md
    related_claims:
    - generic_tracing_is_not_unique
    - cross_harness_behavioral_intelligence
    answer_short: COS should not claim generic tracing, framework-agnostic support,
      cross-IDE observability, or a large OS surface as unique by themselves.
    answer_long: 'Those claims are either commodity, already pursued by adjacent tools,
      or too broad for first-contact product messaging. COS should use them as supporting
      substrate and lead with behavioral governance: verification, coordination, cost-to-outcome,
      receipts, and governed improvement.'
    recommended_pitch: Do not sell more platform; sell fewer unverified agent actions
      reaching production.
    unsafe_claims_to_avoid:
    - nobody else has agent-step tracing
    - every IDE has identical COS enforcement
    - COS is valuable because it has many hooks and rules
    gaps:
    - Keep the competitor list refreshed before using named comparisons publicly.
