    related_claims:
    - pricing_strategy_internal_only
    - icp_vp_engineering
    answer_short: 'Pricing should remain an internal strategy answer: OSS core as
      adoption wedge, paid Cloud/Enterprise for hosted evidence, fleet confidence,
      audit, SSO/RBAC, and org-wide controls.'
    answer_long: The current documentation supports an open-core packaging thesis,
      but exact numbers should not be treated as public truth without fresh buyer
      validation. The safe answer is to separate OSS core adoption from Cloud/Enterprise
      monetization around hosted dashboard, cross-session/fleet evidence, audit exports,
      SSO/RBAC, and on-prem or managed control-plane needs.
    recommended_pitch: OSS proves trust locally; Cloud and Enterprise monetize governed
      evidence at team and org scale.
