    - lib/semantic_skill_matcher.py
    - skills/detect-stack/SKILL.md
    related_claims:
    - cross_harness_behavioral_intelligence
    answer_short: Yes. Skill routing is semantic (ADR-296) — not based on human-language keywords or specific programming languages. Sub-agents detect the project stack by context and work in the corresponding language or framework.
    answer_long: >-
      The SemanticSkillMatcher (ADR-296/298/299) uses multilingual embeddings
      against each skill's description field — language-agnostic by nature.
      The multilingual-e5-large model was selected empirically (+14 points
      average over alternatives, ADR-298). Once the correct skill activates,
      sub-agents detect the project stack (/detect-stack) and work in the
      corresponding language and framework without additional configuration.
    recommended_pitch: COS speaks the language of the project, not the other way around.
    unsafe_claims_to_avoid:
    - supports every language and framework with no limitations
    - sub-agents know all frameworks from memory without context
    gaps:
    - Stack-specific knowledge depth depends on the underlying model capabilities.

  architecture_map:
