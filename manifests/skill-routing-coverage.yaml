schema_version: skill-routing-coverage.v1
purpose: SkillRouter coverage ratchet and explicit exceptions for skills that exist
  on disk but are not yet routeable.
baseline:
  captured_on: '2026-05-05'
  min_routed_skill_count: 82
  min_routed_skill_coverage_percent: 44.0
  scope: global-full-surface
  skill_roots:
  - skills/*/SKILL.md
  - .cognitive-os/skills/*/SKILL.md
profile_note:
  status: pending-profile-aware-ratchet
  canonical_mapping:
    lean:
    - default
    - core
    standard:
    - default+team-extensions
    - core+team
    strict:
    - full
    - core+team+maintainer
    lab:
    - opt-in
    - lab
primary_router_orphan_allowlist:
- skill: sdd-new
  routing_class: meta-command
  rationale: Intentional command handled by an orchestration pipeline rather than
    a SKILL.md directory.
unrouted_skill_allowlist:
- skill: __contracts__
  routing_class: routing-backlog
  rationale: Skill exists on disk but has no primary SkillRouter route yet; add routing_patterns
    or hand-coded route, then remove this entry.
