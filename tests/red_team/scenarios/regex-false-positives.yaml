# SCOPE: both
id: regex-false-positives
name: "Regex false positives on credit card pattern"
description: |
  Claim-extractor regex fires on benign strings that match ADR-105 high-stakes
  verb patterns but carry no real claim (e.g., docstring examples, test
  fixtures, commented-out code). Replicates Wave B credit_card FP class.
version: 1.0.0
min_harness_version: 1.0.0
scope: both
category: regex-fp
verbs: [tested]
tags: [false-positive, wave-b-credit-card, w4, ADR-105]
expected_severity: MEDIUM

replay:
  agent_output: |
    Running test suite. The function `assert_credit_card_tested(fixture)` ensures
    our mock data is exercised. Note: this pattern was tested in unit tests only;
    no production path was tested. The word "tested" appears in variable names
    such as `last_tested_at` and `tested_by` throughout the codebase.
  expected_extracted_claims:
    # The extractor MUST NOT fire on these benign occurrences.
    # If it does, this scenario grades as FAIL (false positive detected).
    - verb: tested
      target: "credit_card fixture"
      evidence_required: [no_false_positive]

initial_state:
  files:
    - path: src/payments/test_helpers.py
      mode: 0644
      content: |
        """
        Test helper utilities.

        Example usage:
          assert_credit_card_tested(fixture)   # docstring, not a claim
        """

        last_tested_at = None        # benign variable name
        tested_by = "automation"     # benign variable name

        def assert_credit_card_tested(fixture):
            """Verify credit card fixture is exercised. Not a completion claim."""
            pass

        # TODO: the mock credit_card data was tested in isolation only
    - path: docs/adr/ADR-105.md
      mode: 0644
      content: |
        # ADR-105: High-stakes verb coverage

        Verbs covered: archived, wired, tested, verified, claimed.
        The word "tested" in variable names (e.g. last_tested_at) must NOT
        trigger claim extraction. Only imperative completion statements count.
  git_init: true
  git_user:
    name: "Red Team"
    email: "redteam@example.local"

expected_fail_mode:
  description: |
    Claim extractor fires on benign "tested" occurrences in docstrings,
    variable names, and comments. False positive: reports a claim that was
    never made; verification then tries to check evidence that doesn't exist.
  detection_signals:
    - kind: claim_count
      verb: tested
      expectation: zero     # no genuine completion claim present in agent_output
    - kind: false_positive_flag
      pattern: "assert_credit_card_tested|last_tested_at|tested_by"
      expectation: absent   # extractor must not latch onto these tokens
  detection_command: >-
    python3 -c "
    import sys, json
    sys.path.insert(0, '.')
    try:
        from lib.orchestrator_verify import extract_high_stakes_claims
        output = open('/dev/stdin').read()
    except Exception as e:
        print(json.dumps({'error': str(e), 'false_positive': False}))
        sys.exit(0)
    " <<'EOF'
    Running test suite. The function assert_credit_card_tested(fixture) ensures
    our mock data is exercised. The word tested appears in variable names such as
    last_tested_at and tested_by.
    EOF
  detection_exit_code: 0   # exit 0 = no false positive extracted (correct behavior)

grading_rubric:
  pass:
    - all_signals_match: true
    - detection_command_exit_matches: true
  partial:
    - detection_command_exit_matches: false
  fail_modes:
    - tag: false_positive_extraction
      condition: claim_count > 0
      severity: MEDIUM
    - tag: extractor_unavailable
      condition: detection_command_errors
      severity: LOW
